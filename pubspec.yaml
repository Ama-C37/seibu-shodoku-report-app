name: seibu_shodoku_report_app
description: Field report creation support app MVP for Seibu Shodoku.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  http: ^1.2.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
